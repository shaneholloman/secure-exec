<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Exec Browser Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script defer src="/vendor/typescript.js"></script>
    <script defer src="/vendor/monaco/vs/loader.js"></script>
    <script type="importmap">
      {
        "imports": {
          "secure-exec/browser": "/secure-exec/dist/browser-runtime.js",
          "@secure-exec/core": "/secure-exec-core/dist/index.js",
          "@secure-exec/browser": "/secure-exec-browser/dist/index.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --bg-panel: #0a0a0b;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.18);
        --border-2: rgba(255, 255, 255, 0.14);
        --input-bg: rgba(255, 255, 255, 0.07);
        --input-border: rgba(255, 255, 255, 0.22);
        --text: #ffffff;
        --text-secondary: #e4e4e7;
        --muted: #a1a1aa;
        --muted-2: #8b8b93;
        --accent: #ff4f00;
        --accent-hover: #ff6a00;
        --success: #4ade80;
        --warning: #fbbf24;
        --danger: #dc2626;
        --radius: 8px;
        --radius-sm: 6px;
        --radius-lg: 16px;
        --transition: 200ms ease;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        overflow: hidden;
      }

      body {
        color: var(--text);
        font-family: "Open Sans", system-ui, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::selection {
        background-color: rgba(255, 79, 0, 0.3);
        color: #fed7aa;
      }

      button,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        flex-shrink: 0;
        z-index: 10;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-title {
        font-size: 13px;
        font-weight: 600;
      }

      .header-subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
      }

      .pill strong {
        color: var(--text-secondary);
        font-weight: 600;
      }

      .main-layout {
        flex: 1;
        min-height: 0;
        display: flex;
        overflow: hidden;
      }

      /* Process sidebar */
      .process-sidebar {
        width: 220px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--bg-panel);
        display: flex;
        flex-direction: column;
      }

      .process-sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }

      .process-sidebar-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .add-process-wrapper {
        position: relative;
      }

      .add-process-button {
        width: 24px;
        height: 24px;
        border-radius: var(--radius-sm);
        background: var(--accent);
        border: none;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        line-height: 1;
        transition: background var(--transition);
      }

      .add-process-button:hover {
        background: var(--accent-hover);
      }

      .add-process-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        background: #111113;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        z-index: 20;
        min-width: 140px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .add-process-menu.open {
        display: block;
      }

      .add-process-menu-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 8px 12px;
        background: none;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 500;
        text-align: left;
        transition: background var(--transition);
        position: relative;
        cursor: default;
      }

      .add-process-menu-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .submenu-arrow {
        margin-left: auto;
        font-size: 14px;
        color: var(--muted-2);
      }

      .add-process-submenu {
        display: none;
        position: absolute;
        left: 100%;
        top: 0;
        margin-left: 2px;
        background: #111113;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        min-width: 120px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        z-index: 30;
      }

      .add-process-menu-item:hover > .add-process-submenu {
        display: block;
      }

      .add-process-submenu-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        background: none;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 500;
        text-align: left;
        border: none;
        cursor: pointer;
        transition: background var(--transition);
      }

      .add-process-submenu-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .lang-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .lang-icon svg {
        width: 16px;
        height: 16px;
      }

      .process-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 6px;
      }

      .process-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 8px 10px;
        border-radius: var(--radius-sm);
        background: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        text-align: left;
        transition: background var(--transition), color var(--transition);
        margin-bottom: 2px;
      }

      .process-item:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-secondary);
      }

      .process-item.active {
        background: rgba(255, 79, 0, 0.12);
        color: var(--text);
      }

      .process-item-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: var(--muted);
      }

      .process-item-icon svg {
        width: 16px;
        height: 16px;
      }

      .process-item-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .process-item-close {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        background: none;
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity var(--transition), background var(--transition), color var(--transition);
        flex-shrink: 0;
      }

      .process-item:hover .process-item-close {
        opacity: 1;
      }

      .process-item-close:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      /* Workspace */
      .workspace {
        flex: 1;
        min-width: 0;
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.9fr);
        overflow: hidden;
      }

      .panel {
        min-height: 0;
        background: var(--bg-panel);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }

      .panel-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .select,
      .button {
        min-height: 28px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--input-border);
        background: var(--input-bg);
        color: var(--text);
        transition: border-color var(--transition), background var(--transition), color var(--transition);
      }

      .select {
        min-width: 150px;
        padding: 0 12px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 600;
      }

      .button:hover:not(:disabled),
      .select:hover {
        border-color: rgba(255, 255, 255, 0.28);
      }

      .button.primary {
        background: var(--accent);
        border-color: transparent;
        color: #fff;
      }

      .button.primary:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .button:disabled,
      .select:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .editor-shell {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .editor-header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .editor {
        flex: 1;
        min-height: 0;
      }

      .right-sidebar {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        border-left: 1px solid var(--border);
      }

      .output-shell {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
      }

      .output {
        flex: 1;
        overflow: auto;
        padding: 16px;
        background: #050506;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      }

      .output-line {
        white-space: pre-wrap;
        word-break: break-word;
        margin-bottom: 8px;
      }

      .output-line.stdout {
        color: var(--text-secondary);
      }

      .output-line.stderr {
        color: #fca5a5;
      }

      .output-line.system {
        color: var(--muted);
      }

      .snippet-panel {
        padding: 0;
        flex-shrink: 0;
        border-top: 1px solid var(--border);
      }

      .snippet-code {
        padding: 14px 16px;
        background: #0b0e14;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #bfbdb6;
        overflow-x: auto;
        white-space: pre;
      }

      .snippet-code .sk { color: #ff8f40; }
      .snippet-code .ss { color: #aad94c; }
      .snippet-code .sf { color: #ffb454; }
      .snippet-code .sc { color: #5c6773; }
      .snippet-code .sv { color: #bfbdb6; }
      .snippet-code .st { color: #59c2ff; }

      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .status-indicator {
        color: var(--warning);
      }

      .status-indicator.ready {
        color: var(--success);
      }

      .status-indicator.error {
        color: #fca5a5;
      }

      .hint {
        color: var(--muted-2);
      }

      .empty-state {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: var(--muted-2);
        font-size: 13px;
      }

      .empty-state-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        background: var(--accent);
        border: none;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--transition);
      }

      .empty-state-button:hover {
        background: var(--accent-hover);
      }

      .empty-state-wrapper {
        position: relative;
      }

      .empty-state-menu {
        bottom: auto;
        top: 100%;
        margin-top: 4px;
        margin-bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        min-width: 160px;
      }

      @media (max-width: 1024px) {
        .process-sidebar {
          width: 180px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .editor-shell,
        .output-shell {
          height: auto;
          min-height: 440px;
        }
      }

      @media (max-width: 720px) {
        .process-sidebar {
          width: 160px;
        }

        .panel-header,
        .editor-meta,
        .output {
          padding-left: 14px;
          padding-right: 14px;
        }

        .header {
          align-items: flex-start;
          flex-direction: column;
          padding: 12px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-left">
          <div>
            <div class="header-title">Secure Exec Playground</div>
            <div class="header-subtitle">This code is running sandboxed in your browser and also supports executing in Node.js.</div>
          </div>
        </div>
        <div class="header-meta">
          <div class="pill status-indicator" id="runtime-status">Preparing editor</div>
        </div>
      </header>

      <div class="main-layout">
        <nav class="process-sidebar">
          <div class="process-sidebar-header">
            <div class="process-sidebar-title">Instances</div>
            <div class="add-process-wrapper">
              <button id="add-process-button" class="add-process-button" type="button" aria-label="New instance">+</button>
              <div id="add-process-menu" class="add-process-menu"></div>
            </div>
          </div>
          <div id="process-list" class="process-list"></div>
        </nav>

        <main class="workspace" id="workspace">
          <div class="empty-state" id="empty-state">
            <span>No runtime instances</span>
            <div class="empty-state-wrapper">
              <button id="empty-state-new" class="empty-state-button" type="button">+ New Instance</button>
              <div id="empty-state-menu" class="add-process-menu empty-state-menu"></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="/dist/app.js"></script>
  </body>
</html>
